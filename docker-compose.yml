services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - SESSION_SECRET=${SESSION_SECRET:-change-me-to-a-random-string}
      - PORT=3000
      - TZ=Asia/Shanghai
    volumes:
      - db_data:/app/data       # SQLite database persists here

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"                 # HTTP — cloud LB can front with HTTPS
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/app/public:ro
    depends_on:
      - app

volumes:
  db_data:                      # Named volume — survives container rebuilds
